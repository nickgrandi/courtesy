<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Sito in costruzione</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/logo_andrea-tarozzi-fisioterapista_1.ico">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f4f6;
            color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .wrapper {
            text-align: center;
            padding: 2.5rem 2rem;
            max-width: 480px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
        }

        /* LOGO DEL SITO */
        .site-logo {
            width: 140px;
            margin: 0 auto 1.5rem;
            display: block;
        }

        /* ICONA CON GRADIENTE */
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #0098AA, #00c4d4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 2.4rem;
        }

        h1 {
            font-size: 1.7rem;
            margin-bottom: 0.75rem;
        }

        p {
            font-size: 0.98rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 1.2rem;
        }

        .countdown {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0098AA;
            margin-bottom: 1.8rem;
        }

        /* BOTTONE CON GRADIENTE */
        .btn {
            display: inline-block;
            padding: 0.7rem 1.6rem;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #0098AA, #00c4d4);
            color: #fff;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: default;
        }

        footer {
            margin-top: 1.8rem;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <main class="wrapper">

        <!-- LOGO DEL SITO -->
        <img src="img/logo_andrea-tarozzi-fisioterapista_1.png" alt="Logo del sito" class="site-logo">

        <!-- ICONA -->
        <div class="icon">🚧</div>

        <h1>Sito in costruzione</h1>

        <p>Stiamo lavorando per offrirti un sito ricco di informazioni<br>per la tua salute</p>

        <div class="countdown">
            Verrai reindirizzato a Google Maps tra <span id="timer">5</span> secondi
        </div>

        <button class="btn" type="button" disabled>
            In arrivo a breve
        </button>

        <footer>
            &copy; <span id="year"></span> Andrea Tarozzi Fisioterapista
        </footer>
    </main>

    <script>
        // Imposta automaticamente l'anno corrente
        document.getElementById('year').textContent = new Date().getFullYear();

        // Countdown + redirect
        let seconds = 5;
        const timerEl = document.getElementById('timer');

        const countdown = setInterval(() => {
            seconds--;
            timerEl.textContent = seconds;

            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = "https://maps.app.goo.gl/BUzJAHeg226dAXR26";
            }
        }, 1000);
    </script>
</body>
</html>
